<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Life Quest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem 4rem;}
.app{width:100%;max-width:520px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;}
.overlay.hide{display:none;}
.modal{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:90%;max-width:400px;text-align:center;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:.5rem;}
.modal p{font-size:13px;color:#666;margin-bottom:1.5rem;line-height:1.6;}
.class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.class-card{border:1.5px solid #e0e0e0;border-radius:12px;padding:1rem .5rem;cursor:pointer;transition:all .15s;}
.class-card:hover{border-color:#aaa;}
.class-card.sel{border-color:#1a1a1a;background:#f5f5f5;}
.class-icon{font-size:28px;margin-bottom:6px;}
.class-name{font-size:13px;font-weight:600;}
.class-desc{font-size:11px;color:#888;margin-top:3px;line-height:1.4;}
.confirm-btn{width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-.02em;}
.class-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;cursor:pointer;border:1px solid #e0e0e0;}
.cls-w{background:#faecea;color:#a33;border-color:#f5c0c0;}
.cls-s{background:#e6f0ff;color:#2255cc;border-color:#b0c8f5;}
.cls-r{background:#e6f5ee;color:#0a7a52;border-color:#9addc0;}
.bars{margin-bottom:1rem;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-label{font-size:11px;color:#888;width:32px;letter-spacing:.03em;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:#e8e8e8;border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease;}
.xp-fill{background:#1a1a1a;}
.hp-fill{background:#e05555;}
.bar-hint{font-size:11px;color:#888;white-space:nowrap;min-width:52px;text-align:right;}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.kpi{padding:.6rem .85rem;border:1px solid #ebebeb;border-radius:10px;background:#fff;}
.kpi-label{font-size:11px;color:#888;margin-bottom:3px;}
.kpi-val{font-size:20px;font-weight:600;}
.kpi-val.g{color:#0a7a52;}
.kpi-val.r{color:#c33;}
.challenge{border:1px solid #ebebeb;border-radius:10px;background:#fff;padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.challenge.done-ch{opacity:.5;}
.ch-icon{font-size:20px;flex-shrink:0;}
.ch-body{flex:1;}
.ch-title{font-size:13px;font-weight:500;}
.ch-sub{font-size:11px;color:#888;margin-top:2px;}
.ch-reward{font-size:12px;font-weight:600;color:#0a7a52;white-space:nowrap;}
.tabs{display:flex;border-bottom:1px solid #ebebeb;margin-bottom:1rem;}
.tab{font-size:13px;padding:6px 0;margin-right:1.25rem;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;color:#888;}
.tab.on{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a;}
.sec{display:none;}
.sec.on{display:block;}
.add-row{display:flex;gap:6px;margin-bottom:.85rem;flex-wrap:wrap;}
.add-row input,.add-row select{font-size:13px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;}
.add-row input[type=text],.add-row input:not([type]){flex:1;min-width:120px;}
.add-row input[type=number]{width:64px;flex:none;}
.add-row input[type=date]{width:130px;flex:none;font-size:12px;}
.add-row select{width:76px;}
.add-row input:focus,.add-row select:focus{border-color:#aaa;}
.add-btn{padding:7px 13px;font-size:13px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;}
.add-btn:active{opacity:.75;}
.list{display:flex;flex-direction:column;gap:6px;}
.row{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid #ebebeb;border-radius:10px;background:#fff;transition:opacity .2s;flex-wrap:wrap;}
.row.done{opacity:.4;}
.row.done .rname{text-decoration:line-through;color:#aaa;}
.ck{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;transition:all .15s;}
.ck.on{background:#1a1a1a;border-color:#1a1a1a;}
.ck-mark{display:none;font-size:10px;color:#fff;}
.ck.on .ck-mark{display:block;}
.rname{flex:1;font-size:13px;min-width:80px;}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.bg{background:#e6f5ee;color:#0a7a52;}
.br{background:#faecea;color:#a33;}
.ba{background:#fdf3e0;color:#8a5a00;}
.dots{display:flex;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot.on{background:#1a1a1a;}
.dot.off{background:#f0f0f0;border:1px solid #ddd;}
.del{font-size:15px;color:#ccc;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;}
.del:hover{color:#888;}
.mob-wrap{width:100%;margin-top:5px;}
.mob-track{width:100%;height:5px;background:#f0e0e0;border-radius:99px;overflow:hidden;}
.mob-fill{height:100%;border-radius:99px;background:#e05555;transition:width .3s ease;}
.mob-label{font-size:10px;color:#aaa;margin-top:2px;}
.rdm-btn{font-size:12px;padding:4px 10px;border:1px solid #e0e0e0;border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer;white-space:nowrap;}
.rdm-btn:not(:disabled):hover{background:#f5f5f5;}
.rdm-btn:disabled{opacity:.35;cursor:default;}
.note{font-size:12px;color:#aaa;padding:.6rem 0;text-align:center;}
.penalty-note{font-size:11px;color:#999;margin-top:.5rem;}
.deadline{font-size:11px;padding:1px 6px;border-radius:99px;font-weight:600;white-space:nowrap;}
.dl-ok{background:#e6f5ee;color:#0a7a52;}
.dl-soon{background:#fdf3e0;color:#8a5a00;}
.dl-over{background:#faecea;color:#a33;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;font-size:12px;padding:8px 18px;border-radius:99px;transition:transform .25s ease;z-index:300;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(prefers-color-scheme:dark){
  body{background:#111;color:#f0f0f0;}
  .modal{background:#1e1e1e;color:#f0f0f0;}
  .modal p{color:#aaa;}
  .class-card{border-color:#333;}
  .class-card.sel{background:#2a2a2a;border-color:#f0f0f0;}
  .kpi,.row,.challenge{background:#1e1e1e;border-color:#333;}
  .tab.on{color:#f0f0f0;border-bottom-color:#f0f0f0;}
  .tab{color:#666;}
  .tabs,.class-badge{border-color:#333;}
  .add-row input,.add-row select{background:#1e1e1e;color:#f0f0f0;border-color:#333;}
  .add-btn,.confirm-btn{background:#f0f0f0;color:#111;}
  .dot.off{background:#2a2a2a;border-color:#444;}
  .ck{border-color:#555;}
  .ck.on{background:#f0f0f0;border-color:#f0f0f0;}
  .ck-mark{color:#111;}
  .del{color:#555;}
  .rdm-btn{border-color:#333;color:#f0f0f0;}
  .rdm-btn:not(:disabled):hover{background:#2a2a2a;}
  .bar-track{background:#333;}
  .xp-fill{background:#f0f0f0;}
  .toast{background:#f0f0f0;color:#111;}
  .bg{background:#0d3a25;color:#4ec98a;}
  .br{background:#3a1212;color:#e07070;}
  .ba{background:#3a2800;color:#e0a840;}
  .kpi-val.g{color:#4ec98a;}
  .kpi-val.r{color:#e07070;}
  .dl-ok{background:#0d3a25;color:#4ec98a;}
  .dl-soon{background:#3a2800;color:#e0a840;}
  .dl-over{background:#3a1212;color:#e07070;}
  .mob-track{background:#3a2020;}
  .cls-w{background:#3a1212;color:#e07070;border-color:#a33;}
  .cls-s{background:#12203a;color:#7090ee;border-color:#2255cc;}
  .cls-r{background:#0d3a25;color:#4ec98a;border-color:#0a7a52;}
  .ch-reward{color:#4ec98a;}
.spin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.spin-overlay.hide{display:none;}
.spin-modal{background:#fff;border-radius:16px;padding:1.5rem;width:92%;max-width:360px;text-align:center;}
.spin-modal h3{font-size:16px;font-weight:600;margin-bottom:1rem;}
.wheel-wrap{position:relative;width:260px;height:260px;margin:0 auto 1.2rem;}
#wheelCanvas{border-radius:50%;display:block;}
.wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:26px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.3));}
.spin-result{font-size:14px;font-weight:500;min-height:20px;margin-bottom:1rem;color:#1a1a1a;}
.spin-btns{display:flex;gap:8px;}
.spin-btns button{flex:1;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.spin-go{background:#1a1a1a;color:#fff;}
.spin-go:disabled{opacity:.4;cursor:default;}
.spin-close{background:#f0f0f0;color:#1a1a1a;}
@media(prefers-color-scheme:dark){
  .spin-modal{background:#1e1e1e;color:#f0f0f0;}
  .spin-result{color:#f0f0f0;}
  .spin-close{background:#333;color:#f0f0f0;}
}
</style>
</head>
<body>
<div class="overlay hide" id="classOverlay">
  <div class="modal">
    <h2>選擇你的職業</h2>
    <p>職業決定積分加成方向<br>之後可點右上角職業名稱更換</p>
    <div class="class-grid">
      <div class="class-card" data-cls="warrior" onclick="selectClass(this)">
        <div class="class-icon">⚔️</div>
        <div class="class-name">戰士</div>
        <div class="class-desc">待辦完成<br>積分 ×1.2</div>
      </div>
      <div class="class-card" data-cls="scholar" onclick="selectClass(this)">
        <div class="class-icon">📖</div>
        <div class="class-name">學者</div>
        <div class="class-desc">習慣打卡<br>積分 ×1.2</div>
      </div>
      <div class="class-card" data-cls="ranger" onclick="selectClass(this)">
        <div class="class-icon">⚡</div>
        <div class="class-name">遊俠</div>
        <div class="class-desc">計次習慣<br>積分 ×1.2</div>
      </div>
    </div>
    <button class="confirm-btn" onclick="confirmClass()">確認</button>
  </div>
</div>

<div class="spin-overlay hide" id="spinOverlay">
  <div class="spin-modal">
    <h3>🎡 今天先做這個！</h3>
    <div class="wheel-wrap">
      <canvas id="wheelCanvas" width="260" height="260"></canvas>
      <div class="wheel-pointer">▼</div>
    </div>
    <div class="spin-result" id="spinResult">按下旋轉</div>
    <div class="spin-btns">
      <button class="spin-go" id="spinBtn" onclick="spinWheel()">旋轉</button>
      <button class="spin-close" onclick="closeSpinOverlay()">關閉</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="hdr">
    <h1>Life Quest</h1>
    <span class="class-badge" id="clsBadge" onclick="openClassSelect()">選擇職業</span>
  </div>

  <div class="bars">
    <div class="bar-row">
      <span class="bar-label">Lv<span id="lvNum">1</span></span>
      <div class="bar-track"><div class="bar-fill xp-fill" id="xpFill" style="width:0%"></div></div>
      <span class="bar-hint" id="xpHint">0/100</span>
    </div>
    <div class="bar-row">
      <span class="bar-label" style="color:#c33;">HP</span>
      <div class="bar-track"><div class="bar-fill hp-fill" id="hpFill" style="width:100%"></div></div>
      <span class="bar-hint" id="hpHint">100/100</span>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="kpi-label">積分</div><div class="kpi-val g" id="kPts">0</div></div>
    <div class="kpi"><div class="kpi-label">今日完成</div><div class="kpi-val" id="kDone">0</div></div>
    <div class="kpi"><div class="kpi-label">今日得分</div><div class="kpi-val g" id="kTodayPts">+0</div></div>
  </div>

  <div class="challenge" id="challengeBox">
    <span class="ch-icon">🎯</span>
    <div class="ch-body">
      <div class="ch-title" id="chTitle">今日挑戰載入中...</div>
      <div class="ch-sub" id="chSub"></div>
    </div>
    <span class="ch-reward" id="chReward"></span>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="sw('todo',this)">待辦</button>
    <button class="tab" onclick="sw('habit',this)">習慣</button>
    <button class="tab" onclick="sw('reward',this)">獎勵</button>
  </div>

  <div id="s-todo" class="sec on">
    <div class="add-row">
      <input id="tIn" placeholder="新增待辦事項..." onkeydown="if(event.key==='Enter')addTodo()"/>
      <input type="date" id="tDate"/>
      <input type="number" id="tPt" value="10" placeholder="pt"/>
      <select id="tType"><option value="normal">一般</option><option value="monster">打怪</option></select>
      <button class="add-btn" onclick="addTodo()">新增</button>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:.6rem;">
      <button class="rdm-btn" onclick="openSpinOverlay()" style="font-size:12px;">🎡 幫我選一個</button>
    </div>
    <div class="list" id="todoList"></div>
    <div class="penalty-note" id="penNote"></div>
  </div>

  <div id="s-habit" class="sec">
    <div class="add-row">
      <input id="hIn" placeholder="新增每日習慣..." onkeydown="if(event.key==='Enter')addHabit()"/>
      <input type="number" id="hPt" value="10" placeholder="pt" min="1"/>
      <select id="hType"><option value="check">打卡</option><option value="count">計次</option></select>
      <button class="add-btn" onclick="addHabit()">新增</button>
    </div>
    <div class="list" id="habitList"></div>
    <div class="note">打卡型：連續7天→積分加倍，打卡回復2HP｜計次型：每次累加積分</div>
  </div>

  <div id="s-reward" class="sec">
    <div class="add-row">
      <input id="rIn" placeholder="新增獎勵..." onkeydown="if(event.key==='Enter')addReward()"/>
      <input type="number" id="rCost" value="100" placeholder="pt" min="1"/>
      <button class="add-btn" onclick="addReward()">新增</button>
    </div>
    <div class="list" id="rewardList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="loadingHint" style="display:none;position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:12px;padding:6px 16px;border-radius:99px;z-index:400;">載入中...</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyBXbkFkenh4twFbpNqaxy0cBxOUJ3bEQFs",
  authDomain:"lifequest-d0ace.firebaseapp.com",
  projectId:"lifequest-d0ace",
  storageBucket:"lifequest-d0ace.firebasestorage.app",
  messagingSenderId:"781843978297",
  appId:"1:781843978297:web:05cf97d5108b48288dd5e8"
};

const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);
const DOC_ID='main'; // 單一使用者，固定 doc

const SAVE_KEY='life-quest-v2';
const MAX_HP=100;
let state,selectedClass=null;
let saveTimer=null;

const CLASSES={
  warrior:{name:'戰士',icon:'⚔️',css:'cls-w',bonus:'todo'},
  scholar:{name:'學者',icon:'📖',css:'cls-s',bonus:'habit_check'},
  ranger:{name:'遊俠',icon:'⚡',css:'cls-r',bonus:'habit_count'},
};

const CHALLENGES=[
  {text:'完成 3 件待辦',sub:'完成任意 3 件待辦事項',req:s=>s.todos.filter(x=>x.checked).length>=3,reward:30},
  {text:'打卡所有習慣',sub:'所有打卡型習慣今天都完成',req:s=>{const ch=s.habits.filter(x=>x.type==='check');return ch.length>0&&ch.every(x=>x.doneToday);},reward:40},
  {text:'擊倒一隻怪物',sub:'完成任意一件打怪任務',req:s=>s.todos.some(x=>x.ttype==='monster'&&x.checked),reward:50},
  {text:'計次習慣累計 5 次',sub:'任一計次習慣今日達 5 次',req:s=>s.habits.some(x=>x.type==='count'&&(x.countToday||0)>=5),reward:35},
  {text:'完成 5 件待辦',sub:'完成任意 5 件待辦事項',req:s=>s.todos.filter(x=>x.checked).length>=5,reward:50},
  {text:'今日得分超過 50pt',sub:'當天累積得分達到 50pt',req:s=>(s.todayPts||0)>=50,reward:25},
  {text:'連續打卡達 3 天',sub:'任一習慣連續天數達 3 天',req:s=>s.habits.some(x=>x.streak>=3),reward:30},
  {text:'完成所有待辦',sub:'所有待辦事項今天都打勾',req:s=>s.todos.length>0&&s.todos.every(x=>x.checked),reward:60},
];

function today(){return new Date().toISOString().slice(0,10);}
function getDailyChallenge(){const seed=today().replace(/-/g,'');return CHALLENGES[parseInt(seed)%CHALLENGES.length];}
function defaultState(){return{pts:0,done:0,maxStreak:0,todayPts:0,nid:20,hp:MAX_HP,cls:null,todos:[],habits:[],rewards:[],lastDate:today(),challengeDone:false};}

function applyDailyReset(s){
  if(s.lastDate===today())return s;
  const daysMissed=Math.max(1,Math.round((new Date(today())-new Date(s.lastDate))/(1000*60*60*24)));
  s.done=0;s.todayPts=0;s.challengeDone=false;let hpLoss=0;
  s.habits.forEach(h=>{
    if(h.type==='count'){h.countToday=0;}
    else{
      if(!h.doneToday){h.log.push(0);h.streak=0;const pen=Math.round(h.pt/2)*daysMissed;s.pts=Math.max(0,s.pts-pen);s.todayPts-=pen;hpLoss+=5*daysMissed;}
      h.doneToday=false;
    }
  });
  s.todos.forEach(t=>{
    if(!t.checked&&t.due){
      const over=Math.max(0,-Math.ceil((new Date(t.due)-new Date(today()))/(1000*60*60*24)));
      const prev=Math.max(0,-Math.ceil((new Date(t.due)-new Date(s.lastDate))/(1000*60*60*24)));
      const nd=over-prev;
      if(nd>0){const pen=Math.round(Math.abs(t.pt)/2)*nd;s.pts=Math.max(0,s.pts-pen);s.todayPts-=pen;hpLoss+=3*nd;}
    }
    if(t.ttype==='monster'&&!t.checked)hpLoss+=5*daysMissed;
  });
  s.hp=Math.max(0,s.hp-hpLoss);
  if(s.hp<=0){s.pts=Math.floor(s.pts/2);s.hp=Math.floor(MAX_HP/2);setTimeout(()=>toast('💀 HP 歸零！積分減半，HP 回復一半'),400);}
  s.lastDate=today();
  return s;
}

async function load(){
  document.getElementById('loadingHint').style.display='block';
  try{
    const snap=await getDoc(doc(db,'users',DOC_ID));
    if(snap.exists()){state=snap.data();}
    else{
      // fallback to localStorage
      try{const raw=localStorage.getItem(SAVE_KEY);state=raw?JSON.parse(raw):defaultState();}
      catch(e){state=defaultState();}
    }
  }catch(e){
    console.warn('Firebase load failed, using localStorage',e);
    try{const raw=localStorage.getItem(SAVE_KEY);state=raw?JSON.parse(raw):defaultState();}
    catch(e2){state=defaultState();}
  }
  if(!state.hp)state.hp=MAX_HP;
  if(state.challengeDone===undefined)state.challengeDone=false;
  state=applyDailyReset(state);
  document.getElementById('loadingHint').style.display='none';
  initUI();
}

function save(){
  // immediate localStorage backup
  localStorage.setItem(SAVE_KEY,JSON.stringify(state));
  // debounce Firebase write (500ms)
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await setDoc(doc(db,'users',DOC_ID),state);}
    catch(e){console.warn('Firebase save failed',e);}
  },500);
}

function clsMul(type){const c=state.cls;if(!c)return 1;return CLASSES[c]?.bonus===type?1.2:1;}
function applyMul(pt,type){return Math.round(pt*clsMul(type));}

function lvInfo(p){let lv=1,need=100,acc=0;while(p>=acc+need){acc+=need;lv++;need=Math.round(need*1.5);}return{lv,cur:p-acc,need};}

function updateTop(){
  const{lv,cur,need}=lvInfo(Math.max(0,state.pts));
  document.getElementById('lvNum').textContent=lv;
  document.getElementById('xpFill').style.width=Math.round(cur/need*100)+'%';
  document.getElementById('xpHint').textContent=cur+'/'+need;
  document.getElementById('hpFill').style.width=Math.round(state.hp/MAX_HP*100)+'%';
  document.getElementById('hpHint').textContent=state.hp+'/'+MAX_HP;
  document.getElementById('kPts').textContent=state.pts;
  document.getElementById('kDone').textContent=state.done;
  const tp=state.todayPts||0;
  const el=document.getElementById('kTodayPts');
  el.textContent=(tp>=0?'+':'')+tp;el.className='kpi-val '+(tp>=0?'g':'r');
  document.querySelectorAll('.rdm-btn').forEach(b=>{b.disabled=state.pts<+b.dataset.cost;});
  updateChallenge();
}

function updateChallenge(){
  const ch=getDailyChallenge();
  if(!state.challengeDone&&ch.req(state)){
    state.challengeDone=true;state.pts+=ch.reward;state.todayPts+=ch.reward;save();
    setTimeout(()=>toast('🎯 每日挑戰完成！+'+ch.reward+'pt'),200);
  }
  const box=document.getElementById('challengeBox');
  box.className='challenge'+(state.challengeDone?' done-ch':'');
  document.getElementById('chTitle').textContent=(state.challengeDone?'✓ ':'')+ch.text;
  document.getElementById('chSub').textContent=ch.sub;
  document.getElementById('chReward').textContent=state.challengeDone?'已領取':'+'+ch.reward+'pt';
}

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date(today()))/(86400000));}
function dlBadge(d){
  if(!d)return'';const n=daysLeft(d);
  if(n<0)return`<span class="deadline dl-over">逾期${-n}天</span>`;
  if(n===0)return`<span class="deadline dl-soon">今天到期</span>`;
  if(n<=3)return`<span class="deadline dl-soon">剩${n}天</span>`;
  return`<span class="deadline dl-ok">剩${n}天</span>`;
}

function renderTodos(){
  const el=document.getElementById('todoList');
  if(!state.todos.length){el.innerHTML='<div class="note">沒有待辦，新增一個！</div>';return;}
  el.innerHTML=state.todos.map(t=>{
    const isMob=t.ttype==='monster';
    const hpPct=isMob?Math.round(Math.max(0,(t.hpMax||3)-(t.hits||0))/(t.hpMax||3)*100):100;
    const mobBar=isMob&&!t.checked?`<div class="mob-wrap"><div class="mob-track"><div class="mob-fill" style="width:${hpPct}%"></div></div><div class="mob-label">怪物 HP ${Math.max(0,(t.hpMax||3)-(t.hits||0))}/${t.hpMax||3}</div></div>`:'';
    return`<div class="row${t.checked?' done':''}">
      <div class="ck${t.checked?' on':''}" onclick="toggleTodo(${t.id})"><span class="ck-mark">✓</span></div>
      <span class="rname">${t.name}</span>
      ${isMob?'<span class="badge br">👾 怪</span>':''}${dlBadge(t.due)}
      <span class="badge ${t.pt>=0?'bg':'br'}">${t.pt>0?'+':''}${t.pt}pt</span>
      <button class="del" onclick="delTodo(${t.id})">×</button>
      ${mobBar}
    </div>`;
  }).join('');
  const p=state.todos.filter(t=>!t.checked).length;
  document.getElementById('penNote').textContent=p?`還有 ${p} 項未完成`:'';
}

function toggleTodo(id){
  const t=state.todos.find(x=>x.id===id);if(!t)return;
  t.checked=!t.checked;
  let delta=t.checked?t.pt:-t.pt;
  if(t.checked)delta=applyMul(delta,'todo');
  state.pts=Math.max(0,state.pts+delta);state.todayPts=(state.todayPts||0)+delta;
  state.done+=t.checked?1:-1;if(state.done<0)state.done=0;
  if(t.checked){
    if(t.ttype==='monster'){state.hp=Math.min(MAX_HP,state.hp+5);toast(`⚔️ 怪物擊敗！+${delta}pt，回復 5HP`);}
    else toast(delta>0?`+${delta}pt 完成！`:`${delta}pt 扣除`);
  }else toast(`已取消，退回 ${Math.abs(delta)}pt`);
  save();renderTodos();updateTop();
}

function addTodo(){
  const i=document.getElementById('tIn'),p=+document.getElementById('tPt').value;
  const due=document.getElementById('tDate').value||null,ttype=document.getElementById('tType').value;
  if(!i.value.trim())return;
  state.todos.push({id:state.nid++,name:i.value.trim(),pt:p,checked:false,due,ttype,hpMax:ttype==='monster'?Math.max(1,Math.round(Math.abs(p)/5)):null,hits:0});
  i.value='';document.getElementById('tDate').value='';save();renderTodos();
}

function delTodo(id){state.todos=state.todos.filter(x=>x.id!==id);save();renderTodos();updateTop();}

function renderHabits(){
  const el=document.getElementById('habitList');
  if(!state.habits.length){el.innerHTML='<div class="note">新增每日習慣！</div>';return;}
  el.innerHTML=state.habits.map(h=>{
    if(h.type==='count'){
      const mul=clsMul('habit_count'),eff=Math.round(h.pt*mul);
      return`<div class="row"><span class="rname">${h.name}</span>
        <span class="badge ba">今日 ${h.countToday||0} 次</span>
        <span class="badge bg">+${eff}pt／次${mul>1?' ⚡':''}</span>
        <button class="add-btn" style="font-size:12px;padding:4px 10px;" onclick="countHabit(${h.id})">+1</button>
        <button class="del" onclick="delHabit(${h.id})">×</button></div>`;
    }
    const s7=h.streak>=7,mul=s7?2:clsMul('habit_check'),eff=Math.round(h.pt*mul);
    const dots=h.log.slice(-7).map(d=>`<div class="dot ${d?'on':'off'}"></div>`).join('');
    return`<div class="row${h.doneToday?' done':''}">
      <div class="ck${h.doneToday?' on':''}" onclick="checkHabit(${h.id})"><span class="ck-mark">✓</span></div>
      <span class="rname">${h.name}</span>
      <span class="badge ba">${h.streak}天</span>
      <div class="dots">${dots}</div>
      <span class="badge bg">${s7?'×2 ':mul>1?'×1.2 ':''} +${eff}pt</span>
      <button class="del" onclick="delHabit(${h.id})">×</button></div>`;
  }).join('');
}

function checkHabit(id){
  const h=state.habits.find(x=>x.id===id);if(!h||h.doneToday)return;
  h.doneToday=true;h.streak++;h.log.push(1);
  const s7=h.streak>=7,mul=s7?2:clsMul('habit_check'),earn=Math.round(h.pt*mul);
  state.pts+=earn;state.todayPts=(state.todayPts||0)+earn;state.done++;
  if(h.streak>state.maxStreak)state.maxStreak=h.streak;
  state.hp=Math.min(MAX_HP,state.hp+2);
  toast(s7?`連續${h.streak}天！+${earn}pt（加倍）`:`+${earn}pt 打卡，+2HP`);
  save();renderHabits();updateTop();
}

function countHabit(id){
  const h=state.habits.find(x=>x.id===id);if(!h)return;
  h.countToday=(h.countToday||0)+1;
  const earn=Math.round(h.pt*clsMul('habit_count'));
  state.pts+=earn;state.todayPts=(state.todayPts||0)+earn;state.done++;
  toast(`+${earn}pt（今日第 ${h.countToday} 次）`);
  save();renderHabits();updateTop();
}

function addHabit(){
  const i=document.getElementById('hIn'),p=+document.getElementById('hPt').value,type=document.getElementById('hType').value;
  if(!i.value.trim())return;
  state.habits.push(type==='count'?{id:state.nid++,name:i.value.trim(),pt:p,type:'count',countToday:0}:{id:state.nid++,name:i.value.trim(),pt:p,type:'check',streak:0,log:[0,0,0,0,0,0,0],doneToday:false});
  i.value='';save();renderHabits();
}

function delHabit(id){state.habits=state.habits.filter(x=>x.id!==id);save();renderHabits();}

function renderRewards(){
  const el=document.getElementById('rewardList');
  if(!state.rewards.length){el.innerHTML='<div class="note">新增想兌換的獎勵！</div>';return;}
  el.innerHTML=state.rewards.map(r=>`<div class="row">
    <span class="rname">${r.name}</span>
    <span class="badge bg">${r.cost}pt</span>
    <button class="rdm-btn" data-cost="${r.cost}" onclick="redeem(${r.id})" ${state.pts<r.cost?'disabled':''}>兌換</button>
    <button class="del" onclick="delReward(${r.id})">×</button></div>`).join('');
}

function redeem(id){
  const r=state.rewards.find(x=>x.id===id);if(!r||state.pts<r.cost)return;
  state.pts-=r.cost;toast(`「${r.name}」已兌換！`);save();renderRewards();updateTop();
}

function addReward(){
  const i=document.getElementById('rIn'),c=+document.getElementById('rCost').value;
  if(!i.value.trim())return;
  state.rewards.push({id:state.nid++,name:i.value.trim(),cost:c});
  i.value='';save();renderRewards();updateTop();
}

function delReward(id){state.rewards=state.rewards.filter(x=>x.id!==id);save();renderRewards();updateTop();}

function openClassSelect(){
  document.getElementById('classOverlay').classList.remove('hide');
  document.querySelectorAll('.class-card').forEach(c=>c.classList.toggle('sel',c.dataset.cls===state.cls));
  selectedClass=state.cls;
}

function selectClass(el){
  document.querySelectorAll('.class-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');selectedClass=el.dataset.cls;
}

function confirmClass(){
  if(!selectedClass)return;
  state.cls=selectedClass;save();
  document.getElementById('classOverlay').classList.add('hide');
  updateClassBadge();renderHabits();updateTop();
  toast(`職業設定：${CLASSES[selectedClass].icon} ${CLASSES[selectedClass].name}`);
}

function updateClassBadge(){
  const b=document.getElementById('clsBadge');
  if(!state.cls){b.textContent='選擇職業';b.className='class-badge';return;}
  const c=CLASSES[state.cls];b.textContent=c.icon+' '+c.name;b.className='class-badge '+c.css;
}

function sw(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  ['todo','habit','reward'].forEach(t=>document.getElementById('s-'+t).classList.toggle('on',t===tab));
}

// ---- SPIN WHEEL ----
const WHEEL_COLORS=['#e6f5ee','#fdf3e0','#faecea','#e6f0ff','#ede6ff','#f0f0f0','#e0f0fa','#fce8f0'];
const WHEEL_TEXT_COLOR='#1a1a1a';
let spinning=false,spinAngle=0,spinTarget=0,spinFrame=null,spinItems=[];

function openSpinOverlay(){
  spinItems=state.todos.filter(t=>!t.checked);
  if(!spinItems.length){toast('沒有未完成的待辦！');return;}
  document.getElementById('spinOverlay').classList.remove('hide');
  document.getElementById('spinResult').textContent='按下旋轉';
  document.getElementById('spinBtn').disabled=false;
  drawWheel(spinAngle);
}

function closeSpinOverlay(){
  document.getElementById('spinOverlay').classList.add('hide');
  if(spinFrame)cancelAnimationFrame(spinFrame);
}

function drawWheel(angle){
  const canvas=document.getElementById('wheelCanvas');
  const ctx=canvas.getContext('2d');
  const cx=130,cy=130,r=125;
  const n=spinItems.length;
  const arc=2*Math.PI/n;
  ctx.clearRect(0,0,260,260);
  spinItems.forEach((item,i)=>{
    const start=angle+i*arc,end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=WHEEL_COLORS[i%WHEEL_COLORS.length];ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign='right';ctx.fillStyle=WHEEL_TEXT_COLOR;
    const maxLen=12;
    const label=item.name.length>maxLen?item.name.slice(0,maxLen)+'…':item.name;
    ctx.font=`${n>6?11:13}px -apple-system,sans-serif`;
    ctx.fillText(label,r-10,4);ctx.restore();
  });
  // center circle
  ctx.beginPath();ctx.arc(cx,cy,18,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1.5;ctx.stroke();
}

function spinWheel(){
  if(spinning||!spinItems.length)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinResult').textContent='旋轉中...';
  const extraSpins=5+Math.random()*5;
  const targetIdx=Math.floor(Math.random()*spinItems.length);
  const arc=2*Math.PI/spinItems.length;
  // pointer is at top (−π/2), we want targetIdx sector center to land there
  const sectorCenter=targetIdx*arc+arc/2;
  const targetAngle=(-Math.PI/2)-sectorCenter+2*Math.PI*Math.ceil(extraSpins);
  spinTarget=spinAngle+targetAngle+(2*Math.PI*Math.floor(extraSpins));
  const duration=3500;
  const start=performance.now();
  const startAngle=spinAngle;
  function animate(now){
    const elapsed=now-start;
    const t=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-t,4);
    spinAngle=startAngle+(spinTarget-startAngle)*ease;
    drawWheel(spinAngle);
    if(t<1){spinFrame=requestAnimationFrame(animate);}
    else{
      spinning=false;
      spinAngle=spinAngle%(2*Math.PI);
      const picked=spinItems[targetIdx];
      document.getElementById('spinResult').textContent='👉 '+picked.name;
      document.getElementById('spinBtn').disabled=false;
    }
  }
  spinFrame=requestAnimationFrame(animate);
}

function initUI(){
  if(!state.cls)document.getElementById('classOverlay').classList.remove('hide');
  updateClassBadge();
  renderTodos();renderHabits();renderRewards();updateTop();
}

// expose functions needed by inline onclick handlers
window.toggleTodo=toggleTodo;window.addTodo=addTodo;window.delTodo=delTodo;
window.checkHabit=checkHabit;window.countHabit=countHabit;window.addHabit=addHabit;window.delHabit=delHabit;
window.redeem=redeem;window.addReward=addReward;window.delReward=delReward;
window.openClassSelect=openClassSelect;window.selectClass=selectClass;window.confirmClass=confirmClass;
window.sw=sw;window.openSpinOverlay=openSpinOverlay;window.closeSpinOverlay=closeSpinOverlay;window.spinWheel=spinWheel;

load();
</script>
