<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Life Quest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem;}
.app{width:100%;max-width:520px;}
h1{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:1.5rem;}

.top{margin-bottom:1.25rem;}
.lv-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.lv-label{font-size:11px;color:#888;letter-spacing:.06em;}
.lv-num{font-size:13px;font-weight:600;}
.xp-track{flex:1;height:3px;background:#e8e8e8;border-radius:99px;overflow:hidden;}
.xp-fill{height:100%;border-radius:99px;background:#1a1a1a;transition:width .4s ease;}
.xp-hint{font-size:11px;color:#888;}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem;}
.kpi{padding:.6rem .85rem;border:1px solid #ebebeb;border-radius:10px;background:#fff;}
.kpi-label{font-size:11px;color:#888;margin-bottom:3px;}
.kpi-val{font-size:20px;font-weight:600;}
.kpi-val.g{color:#0a7a52;}

.tabs{display:flex;border-bottom:1px solid #ebebeb;margin-bottom:1rem;}
.tab{font-size:13px;padding:6px 0;margin-right:1.25rem;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;color:#888;}
.tab.on{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a;}

.sec{display:none;}
.sec.on{display:block;}

.add-row{display:flex;gap:6px;margin-bottom:.85rem;}
.add-row input,.add-row select{font-size:13px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;}
.add-row input[type=text],.add-row input:not([type]){flex:1;}
.add-row input[type=number]{width:64px;flex:none;}
.add-row select{width:86px;}
.add-row input:focus,.add-row select:focus{border-color:#aaa;}
.add-btn{padding:7px 13px;font-size:13px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;}
.add-btn:active{opacity:.75;}

.list{display:flex;flex-direction:column;gap:6px;}
.row{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid #ebebeb;border-radius:10px;background:#fff;transition:opacity .2s;}
.row.done{opacity:.4;}
.row.done .rname{text-decoration:line-through;color:#aaa;}

.ck{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;transition:all .15s;}
.ck.on{background:#1a1a1a;border-color:#1a1a1a;}
.ck-mark{display:none;font-size:10px;color:#fff;}
.ck.on .ck-mark{display:block;}

.rname{flex:1;font-size:13px;}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;}
.bg{background:#e6f5ee;color:#0a7a52;}
.br{background:#faecea;color:#a33;}
.ba{background:#fdf3e0;color:#8a5a00;}

.dots{display:flex;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot.on{background:#1a1a1a;}
.dot.off{background:#f0f0f0;border:1px solid #ddd;}

.del{font-size:15px;color:#ccc;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;}
.del:hover{color:#888;}

.rdm-btn{font-size:12px;padding:4px 10px;border:1px solid #e0e0e0;border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer;white-space:nowrap;}
.rdm-btn:not(:disabled):hover{background:#f5f5f5;}
.rdm-btn:disabled{opacity:.35;cursor:default;}

.note{font-size:12px;color:#aaa;padding:.6rem 0;text-align:center;}
.penalty-note{font-size:11px;color:#999;margin-top:.5rem;}
.deadline{font-size:11px;padding:1px 6px;border-radius:99px;font-weight:600;white-space:nowrap;}
.dl-ok{background:#e6f5ee;color:#0a7a52;}
.dl-soon{background:#fdf3e0;color:#8a5a00;}
.dl-over{background:#faecea;color:#a33;}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;font-size:12px;padding:8px 18px;border-radius:99px;transition:transform .25s ease;z-index:99;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(prefers-color-scheme:dark){
  body{background:#111;color:#f0f0f0;}
  .kpi,.row{background:#1e1e1e;border-color:#333;}
  .tab.on{color:#f0f0f0;border-bottom-color:#f0f0f0;}
  .tab{color:#666;}
  .tabs{border-color:#333;}
  .add-row input,.add-row select{background:#1e1e1e;color:#f0f0f0;border-color:#333;}
  .add-btn{background:#f0f0f0;color:#111;}
  .dot.off{background:#2a2a2a;border-color:#444;}
  .ck{border-color:#555;}
  .ck.on{background:#f0f0f0;border-color:#f0f0f0;}
  .ck-mark{color:#111;}
  .del{color:#555;}
  .rdm-btn{border-color:#333;color:#f0f0f0;}
  .rdm-btn:not(:disabled):hover{background:#2a2a2a;}
  .xp-track{background:#333;}
  .xp-fill{background:#f0f0f0;}
  .toast{background:#f0f0f0;color:#111;}
  .bg{background:#0d3a25;color:#4ec98a;}
  .br{background:#3a1212;color:#e07070;}
  .ba{background:#3a2800;color:#e0a840;}
  .kpi-val.g{color:#4ec98a;}
  .dl-ok{background:#0d3a25;color:#4ec98a;}
  .dl-soon{background:#3a2800;color:#e0a840;}
  .dl-over{background:#3a1212;color:#e07070;}
}
</style>
</head>
<body>
<div class="app">
  <h1>Life Quest</h1>

  <div class="top">
    <div class="lv-row">
      <span class="lv-label">LEVEL</span>
      <span class="lv-num" id="lvNum">1</span>
      <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      <span class="xp-hint" id="xpHint">0 / 100 xp</span>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="kpi-label">積分</div><div class="kpi-val g" id="kPts">0</div></div>
    <div class="kpi"><div class="kpi-label">今日完成</div><div class="kpi-val" id="kDone">0</div></div>
    <div class="kpi"><div class="kpi-label">今日得分</div><div class="kpi-val g" id="kTodayPts">+0</div></div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="sw('todo',this)">待辦</button>
    <button class="tab" onclick="sw('habit',this)">習慣</button>
    <button class="tab" onclick="sw('reward',this)">獎勵</button>
  </div>

  <div id="s-todo" class="sec on">
    <div class="add-row">
      <input id="tIn" placeholder="新增待辦事項..." onkeydown="if(event.key==='Enter')addTodo()"/>
      <input type="date" id="tDate" style="width:130px;flex:none;font-size:12px;"/>
      <input type="number" id="tPt" value="10" placeholder="pt" style="width:64px;text-align:center;" title="正數得分，負數扣分"/>
      <button class="add-btn" onclick="addTodo()">新增</button>
    </div>
    <div class="list" id="todoList"></div>
    <div class="penalty-note" id="penNote"></div>
  </div>

  <div id="s-habit" class="sec">
    <div class="add-row">
      <input id="hIn" placeholder="新增每日習慣..." onkeydown="if(event.key==='Enter')addHabit()"/>
      <input type="number" id="hPt" value="10" placeholder="pt" style="width:64px;text-align:center;" min="1"/>
      <select id="hType" style="width:72px;font-size:12px;">
        <option value="check">打卡</option>
        <option value="count">計次</option>
      </select>
      <button class="add-btn" onclick="addHabit()">新增</button>
    </div>
    <div class="list" id="habitList"></div>
    <div class="note">打卡型：連續 7 天 → 積分加倍｜計次型：每次累加積分</div>
  </div>

  <div id="s-reward" class="sec">
    <div class="add-row">
      <input id="rIn" placeholder="新增獎勵..." onkeydown="if(event.key==='Enter')addReward()"/>
      <input type="number" id="rCost" value="100" placeholder="pt" style="width:64px;text-align:center;" min="1"/>
      <button class="add-btn" onclick="addReward()">新增</button>
    </div>
    <div class="list" id="rewardList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SAVE_KEY='life-quest-v1';
let state;

function defaultState(){
  return{
    pts:0,done:0,maxStreak:0,todayPts:0,nid:20,
    todos:[],
    habits:[],
    rewards:[],
    lastDate:today()
  };
}

function today(){return new Date().toISOString().slice(0,10);}

function load(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(raw){state=JSON.parse(raw);}else{state=defaultState();}
  }catch(e){state=defaultState();}
  // reset daily if new day
  if(state.lastDate!==today()){
    // calculate days missed since lastDate
    const daysMissed=Math.max(1,Math.round((new Date(today())-new Date(state.lastDate))/(1000*60*60*24)));
    state.done=0;
    state.todayPts=0;

    state.habits.forEach(h=>{
      if(h.type==='count'){
        h.countToday=0;
      }else{
        if(!h.doneToday){
          h.log.push(0);
          h.streak=0;
          const pen=Math.round(h.pt/2)*daysMissed;
          state.pts=Math.max(0,state.pts-pen);
          state.todayPts-=pen;
        }
        h.doneToday=false;
      }
    });

    // todo overdue penalty: deduct half pts per overdue day
    state.todos.forEach(t=>{
      if(!t.checked&&t.due){
        const overdue=Math.max(0,-Math.ceil((new Date(t.due)-new Date(today()))/(1000*60*60*24)));
        const prevOverdue=Math.max(0,-Math.ceil((new Date(t.due)-new Date(state.lastDate))/(1000*60*60*24)));
        const newDays=overdue-prevOverdue;
        if(newDays>0){
          const pen=Math.round(Math.abs(t.pt)/2)*newDays;
          state.pts=Math.max(0,state.pts-pen);
          state.todayPts-=pen;
        }
      }
    });

    state.lastDate=today();
    save();
  }
}

function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));}

function lvInfo(p){
  let lv=1,need=100,acc=0;
  while(p>=acc+need){acc+=need;lv++;need=Math.round(need*1.5);}
  return{lv,cur:p-acc,need};
}

function updateTop(){
  const p=Math.max(0,state.pts);
  const{lv,cur,need}=lvInfo(p);
  document.getElementById('lvNum').textContent=lv;
  document.getElementById('xpFill').style.width=Math.round(cur/need*100)+'%';
  document.getElementById('xpHint').textContent=cur+' / '+need+' xp';
  document.getElementById('kPts').textContent=state.pts;
  document.getElementById('kDone').textContent=state.done;
  const tp=state.todayPts||0;
  document.getElementById('kTodayPts').textContent=(tp>=0?'+':'')+tp;
  document.querySelectorAll('.rdm-btn').forEach(b=>{b.disabled=state.pts<+b.dataset.cost;});
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function daysLeft(dateStr){
  if(!dateStr)return null;
  const diff=Math.ceil((new Date(dateStr)-new Date(today()))/(1000*60*60*24));
  return diff;
}
function deadlineBadge(dateStr){
  if(!dateStr)return'';
  const d=daysLeft(dateStr);
  if(d<0)return`<span class="deadline dl-over">逾期 ${-d} 天</span>`;
  if(d===0)return`<span class="deadline dl-soon">今天到期</span>`;
  if(d<=3)return`<span class="deadline dl-soon">剩 ${d} 天</span>`;
  return`<span class="deadline dl-ok">剩 ${d} 天</span>`;
}

function renderTodos(){
  const el=document.getElementById('todoList');
  if(!state.todos.length){el.innerHTML='<div class="note">沒有待辦，新增一個！</div>';return;}
  el.innerHTML=state.todos.map(t=>`
  <div class="row${t.checked?' done':''}">
    <div class="ck${t.checked?' on':''}" onclick="toggleTodo(${t.id})"><span class="ck-mark">✓</span></div>
    <span class="rname">${t.name}</span>
    ${deadlineBadge(t.due)}
    <span class="badge ${t.pt>=0?'bg':'br'}">${t.pt>0?'+':''}${t.pt}pt</span>
    <button class="del" onclick="delTodo(${t.id})">×</button>
  </div>`).join('');
  const pending=state.todos.filter(t=>!t.checked);
  document.getElementById('penNote').textContent=pending.length>0?`還有 ${pending.length} 項未完成`:'';
}

function toggleTodo(id){
  const t=state.todos.find(x=>x.id===id);if(!t)return;
  t.checked=!t.checked;
  const delta=t.checked?t.pt:-t.pt;
  state.pts=Math.max(0,state.pts+delta);
  state.todayPts=(state.todayPts||0)+delta;
  state.done+=t.checked?1:-1;if(state.done<0)state.done=0;
  toast(t.checked?(t.pt>0?`+${t.pt}pt 完成！`:`${t.pt}pt 扣除`):`-${t.pt}pt 已取消完成`);
  save();renderTodos();updateTop();
}

function addTodo(){
  const i=document.getElementById('tIn'),p=+document.getElementById('tPt').value;
  const due=document.getElementById('tDate').value||null;
  if(!i.value.trim())return;
  state.todos.push({id:state.nid++,name:i.value.trim(),pt:p,checked:false,due});
  i.value='';document.getElementById('tDate').value='';save();renderTodos();
}

function delTodo(id){
  state.todos=state.todos.filter(x=>x.id!==id);save();renderTodos();updateTop();
}

function renderHabits(){
  const el=document.getElementById('habitList');
  if(!state.habits.length){el.innerHTML='<div class="note">新增每日習慣！</div>';return;}
  el.innerHTML=state.habits.map(h=>{
    if(h.type==='count'){
      return`<div class="row">
        <span class="rname">${h.name}</span>
        <span class="badge ba">今日 ${h.countToday||0} 次</span>
        <span class="badge bg">+${h.pt}pt／次</span>
        <button class="add-btn" style="font-size:12px;padding:4px 10px;" onclick="countHabit(${h.id})">+1</button>
        <button class="del" onclick="delHabit(${h.id})">×</button>
      </div>`;
    }
    const mul=h.streak>=7?2:1;
    const dots=h.log.slice(-7).map(d=>`<div class="dot ${d?'on':'off'}"></div>`).join('');
    return`<div class="row${h.doneToday?' done':''}">
      <div class="ck${h.doneToday?' on':''}" onclick="checkHabit(${h.id})"><span class="ck-mark">✓</span></div>
      <span class="rname">${h.name}</span>
      <span class="badge ba">${h.streak}天</span>
      <div class="dots">${dots}</div>
      <span class="badge bg">${mul>1?'×2 ':''}+${h.pt*mul}pt</span>
      <button class="del" onclick="delHabit(${h.id})">×</button>
    </div>`;
  }).join('');
}

function checkHabit(id){
  const h=state.habits.find(x=>x.id===id);if(!h||h.doneToday)return;
  h.doneToday=true;h.streak++;h.log.push(1);
  const mul=h.streak>=7?2:1;
  const earn=h.pt*mul;state.pts+=earn;state.todayPts=(state.todayPts||0)+earn;state.done++;
  if(h.streak>state.maxStreak)state.maxStreak=h.streak;
  toast(mul>1?`連續 ${h.streak} 天！+${earn}pt (加倍)`:`+${earn}pt 打卡成功`);
  save();renderHabits();updateTop();
}

function countHabit(id){
  const h=state.habits.find(x=>x.id===id);if(!h)return;
  h.countToday=(h.countToday||0)+1;
  state.pts+=h.pt;state.todayPts=(state.todayPts||0)+h.pt;state.done++;
  toast(`+${h.pt}pt（今日第 ${h.countToday} 次）`);
  save();renderHabits();updateTop();
}

function addHabit(){
  const i=document.getElementById('hIn'),p=+document.getElementById('hPt').value;
  const type=document.getElementById('hType').value;
  if(!i.value.trim())return;
  if(type==='count'){
    state.habits.push({id:state.nid++,name:i.value.trim(),pt:p,type:'count',countToday:0});
  }else{
    state.habits.push({id:state.nid++,name:i.value.trim(),pt:p,type:'check',streak:0,log:[0,0,0,0,0,0,0],doneToday:false});
  }
  i.value='';save();renderHabits();
}

function delHabit(id){state.habits=state.habits.filter(x=>x.id!==id);save();renderHabits();}

function renderRewards(){
  const el=document.getElementById('rewardList');
  if(!state.rewards.length){el.innerHTML='<div class="note">新增想兌換的獎勵！</div>';return;}
  el.innerHTML=state.rewards.map(r=>`
  <div class="row">
    <span class="rname">${r.name}</span>
    <span class="badge bg">${r.cost}pt</span>
    <button class="rdm-btn" data-cost="${r.cost}" onclick="redeem(${r.id})" ${state.pts<r.cost?'disabled':''}>兌換</button>
    <button class="del" onclick="delReward(${r.id})">×</button>
  </div>`).join('');
}

function redeem(id){
  const r=state.rewards.find(x=>x.id===id);if(!r||state.pts<r.cost)return;
  state.pts-=r.cost;toast(`「${r.name}」已兌換！`);save();renderRewards();updateTop();
}

function addReward(){
  const i=document.getElementById('rIn'),c=+document.getElementById('rCost').value;
  if(!i.value.trim())return;
  state.rewards.push({id:state.nid++,name:i.value.trim(),cost:c});
  i.value='';save();renderRewards();updateTop();
}

function sw(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['todo','habit','reward'].forEach(t=>document.getElementById('s-'+t).classList.toggle('on',t===tab));
}

load();
renderTodos();renderHabits();renderRewards();updateTop();
</script>
</body>
</html>
